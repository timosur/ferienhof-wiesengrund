[build]
publish = "public"
command = "hugo --minify"

[build.environment]
HUGO_VERSION = "0.114.1"
NODE_VERSION = "20"

[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[redirects]]
from = "/fhof.php"
to = "/hof/"
status = 301

[[redirects]]
from = "/classic_index.php"
to = "/"
status = 301

