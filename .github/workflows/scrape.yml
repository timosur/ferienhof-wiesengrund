name: Update Availability Data

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Scrape availability
        env:
          LANDREISE_USER: ${{ secrets.LANDREISE_USER }}
          LANDREISE_PASS: ${{ secrets.LANDREISE_PASS }}
        run: python scraper/main.py --availability

      - name: Scrape reviews
        run: python scraper/main.py --reviews

      - name: Copy availability to static
        run: cp data/availability.json static/data/availability.json

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/ static/data/
          git diff --staged --quiet || git commit -m "chore: update availability & reviews data [skip ci]"
          git push
